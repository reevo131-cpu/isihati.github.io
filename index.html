<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Surat untukmu | Sebuah Penyesalan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Bintang galau */
        .star {
            position: absolute;
            background: rgba(255,255,200,0.3);
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(1.2); }
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(20, 20, 40, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid rgba(200, 180, 150, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        /* Amplop/Undangan */
        .envelope {
            text-align: center;
            cursor: pointer;
            padding: 40px 20px;
            transition: 0.3s;
        }

        .envelope i {
            font-size: 5rem;
            color: #d4a373;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .envelope p {
            color: #d4a373;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .envelope:hover {
            transform: scale(1.02);
        }

        .envelope:hover i {
            transform: translateY(-5px);
        }

        /* Surat (awal tersembunyi) */
        .letter {
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .letter.show {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .letter-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px dashed rgba(200, 180, 150, 0.3);
            padding-bottom: 15px;
        }

        .letter-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: #e8d5c4;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .letter-header p {
            color: #9a8c7a;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        .letter-content {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            line-height: 1.9;
            color: #e0d4c8;
            text-align: justify;
            min-height: 400px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Efek mesin tik (cursor berkedip) */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #d4a373;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Tombol reset */
        .reset-btn {
            background: transparent;
            border: 1px solid rgba(200, 180, 150, 0.3);
            color: #9a8c7a;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .reset-btn:hover {
            background: rgba(200, 180, 150, 0.1);
            color: #d4a373;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 550px) {
            .container {
                padding: 20px;
            }
            .letter-content {
                font-size: 0.9rem;
                line-height: 1.7;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Bintang-bintang galau -->
    <div id="stars"></div>

    <div class="container">
        <!-- Amplop (awal) -->
        <div id="envelope" class="envelope" onclick="openLetter()">
            <i class="fas fa-envelope"></i>
            <p>Klik untuk membaca surat</p>
        </div>

        <!-- Surat (tersembunyi) -->
        <div id="letter" class="letter">
            <div class="letter-header">
                <h2>— Surat yang Tak Terkirim —</h2>
                <p>untuk kamu yang dulu</p>
            </div>
            <div class="letter-content" id="letterContent"></div>
            <div class="footer">
                <button class="reset-btn" onclick="resetLetter()">
                    <i class="fas fa-sync-alt"></i> Baca ulang surat
                </button>
            </div>
        </div>
    </div>

    <script>
        // Teks surat lengkap (disesuaikan dengan permintaan)
        const fullText = `Untuk kamu,

Sampai sekarang aku masih belum bisa terbiasa dengan kepergianmu. Setiap hari aku masih sering memikirkan semua hal yang pernah kita lewati. Aku menyesal karena baru menyadari banyak hal setelah semuanya terlambat. Hal-hal yang menurutku biasa saja ternyata bisa melukai perasaanmu, dan aku terlalu sering mengabaikannya sampai kamu lelah.

Jujur, aku hancur ketika menyadari bahwa orang yang paling aku sayangi perlahan menjauh karena kesalahanku sendiri. Aku terus mengingat percakapan kita, kenangan kita, dan semua kesempatan yang seharusnya bisa aku gunakan untuk menjadi lebih baik. Aku berharap waktu bisa diputar kembali, bukan untuk mengubah semuanya menjadi sempurna, tetapi setidaknya untuk memperlakukanmu dengan lebih baik.

Mungkin sekarang kamu sudah tidak lagi melihatku seperti dulu. Mungkin aku sudah menjadi bagian dari masa lalumu. Tapi satu hal yang perlu kamu tahu, perasaanku tidak pernah berubah secepat itu. Aku masih menyayangimu, dan aku masih membawa penyesalan yang sama setiap harinya.

Aku tidak meminta kamu kembali. Aku juga tidak ingin memaksamu untuk tetap tinggal. Aku hanya ingin kamu tahu bahwa kehilanganmu membuatku belajar banyak hal. Aku belajar bahwa cinta bukan hanya tentang memiliki, tetapi juga tentang menghargai, mendengarkan, dan menjaga hati seseorang yang kita sayangi.

Jika suatu hari nanti takdir mempertemukan kita kembali, aku berharap kamu bisa melihat versi diriku yang lebih baik. Dan jika itu tidak pernah terjadi, aku tetap akan berterima kasih karena pernah mengenalmu. Kamu pernah menjadi bagian terindah dalam hidupku, dan kenangan itu akan selalu aku simpan.

Aku menyesal, aku rindu, dan aku masih menyayangimu.`;

        let typewriterInterval = null;
        let currentIndex = 0;
        let isTyping = false;

        // Membuat bintang galau
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = Math.random() * 3 + 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Efek mesin tik (per huruf)
        function startTypewriter() {
            if (typewriterInterval) clearInterval(typewriterInterval);
            if (isTyping) return;
            
            isTyping = true;
            currentIndex = 0;
            const contentDiv = document.getElementById('letterContent');
            contentDiv.innerHTML = '';
            
            typewriterInterval = setInterval(() => {
                if (currentIndex < fullText.length) {
                    // Tambah satu huruf
                    contentDiv.innerHTML += fullText.charAt(currentIndex);
                    currentIndex++;
                    // Scroll ke bawah otomatis
                    contentDiv.scrollTop = contentDiv.scrollHeight;
                } else {
                    // Selesai, bersihkan interval
                    clearInterval(typewriterInterval);
                    typewriterInterval = null;
                    isTyping = false;
                    // Hapus cursor setelah selesai (opsional, biar ga muncul terus)
                    const cursor = document.querySelector('.typewriter-cursor');
                    if (cursor) cursor.style.display = 'none';
                }
            }, 35); // kecepatan 35ms per huruf (nyaman dibaca)
        }

        // Reset dan mainkan ulang
        function resetLetter() {
            if (typewriterInterval) {
                clearInterval(typewriterInterval);
                typewriterInterval = null;
            }
            isTyping = false;
            currentIndex = 0;
            const contentDiv = document.getElementById('letterContent');
            contentDiv.innerHTML = '';
            startTypewriter();
        }

        // Buka amplop, muncul surat, mulai mesin tik
        function openLetter() {
            const envelope = document.getElementById('envelope');
            const letter = document.getElementById('letter');
            
            // Sembunyikan amplop dengan animasi
            envelope.style.transition = 'opacity 0.3s';
            envelope.style.opacity = '0';
            
            setTimeout(() => {
                envelope.style.display = 'none';
                letter.classList.add('show');
                startTypewriter();
            }, 300);
        }

        // Inisialisasi
        createStars();
    </script>
</body>
</html>
